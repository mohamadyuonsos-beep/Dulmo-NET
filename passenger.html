<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dolmuş NET — الراكب</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#F5F7FA;min-height:100vh}
.top-bar{background:#1E88E5;padding:8px 16px;display:flex;align-items:center;justify-content:center}
.top-bar h1{color:white;font-size:18px;font-weight:bold}
.section{background:white;margin:8px;border-radius:12px;padding:10px 14px;box-shadow:0 1px 6px rgba(0,0,0,0.08)}
.section-title{font-size:13px;font-weight:bold;color:#1E88E5;margin-bottom:6px}
.loc-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#444}
.loc-status{flex:1}
.btn{padding:8px 16px;border-radius:10px;border:none;font-size:13px;font-weight:bold;cursor:pointer}
.btn-primary{background:#1E88E5;color:white}
.btn-sm{padding:6px 12px;font-size:12px}
#map{height:52vh;border-radius:10px;overflow:hidden}
.route-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.route-chip{background:#E3F2FD;color:#1E88E5;border:1px solid #1E88E5;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer}
.route-chip.active{background:#1E88E5;color:white}
.buses-list{margin-top:6px}
.bus-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.bus-item:last-child{border-bottom:none}
.bus-dist{color:#43A047;font-weight:bold;font-size:12px;margin-right:auto}
.passenger-badge{background:#FFF3E0;color:#E65100;border-radius:8px;padding:4px 10px;font-size:12px;text-align:center;margin-top:6px}
</style>
</head>
<body>

<div class="top-bar"><h1>🚌 Dolmuş NET</h1></div>

<div class="section">
  <div class="section-title">📍 موقعك الحالي</div>
  <div class="loc-row">
    <span class="loc-status" id="loc-status">جاري التحديد...</span>
    <button class="btn btn-primary btn-sm" onclick="getLocation()">تحديث</button>
  </div>
</div>

<div class="section">
  <div class="section-title">🗺️ الخريطة</div>
  <div id="map"></div>
  <p style="font-size:11px;color:#999;margin-top:4px;text-align:center">اضغط على مسار أو اختره من القائمة</p>
</div>

<div class="section">
  <div class="section-title">🚌 اختر الخط</div>
  <div class="route-list" id="route-list"><span style="color:#aaa;font-size:12px">جاري التحميل...</span></div>
  <div class="passenger-badge" id="passenger-badge" style="display:none">
    🧍 موقعك مرسل للسائق على هذا الخط
  </div>
</div>

<div class="section" id="buses-section" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div class="section-title" style="margin:0">🚌 الحافلات القريبة</div>
    <button class="btn btn-primary btn-sm" onclick="fetchBuses()">🔄</button>
  </div>
  <div class="buses-list" id="buses-list"></div>
</div>

<script>
const SUPABASE_URL = 'https://ezmvwhpmvuokrrvsohuv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tfN63FododffKy9jdqa8Tw_zD5GTnzY';

let userLat = null, userLng = null;
let userMarker = null;
let busMarkers = [];
let selectedRoute = null;
let map = null;
let routeLines = [];
let passengerId = null;
let sendInterval = null;

// توليد ID فريد للراكب في هذه الجلسة
passengerId = 'p_' + Math.random().toString(36).substr(2, 9);

map = L.map('map').setView([36.99, 35.33], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

getLocation();
loadRoutes();
setInterval(fetchBuses, 10000);

function getLocation() {
  document.getElementById('loc-status').textContent = '⏳ جاري التحديد...';
  navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    document.getElementById('loc-status').textContent = '✅ ' + userLat.toFixed(4) + ' , ' + userLng.toFixed(4);
    if (!userMarker) {
      userMarker = L.circleMarker([userLat, userLng], {
        radius:10, color:'#E65100', fillColor:'#FF9800', fillOpacity:1, weight:2
      }).addTo(map).bindPopup('🧍 موقعك');
      map.setView([userLat, userLng], 15);
    } else {
      userMarker.setLatLng([userLat, userLng]);
    }
    // أرسل موقع الراكب إذا اختار خطاً
    if (selectedRoute) sendPassengerLocation();
    fetchBuses();
  }, () => {
    document.getElementById('loc-status').textContent = '❌ تعذّر التحديد';
  }, {enableHighAccuracy:true, timeout:10000, maximumAge:5000});
}

async function loadRoutes() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/routes?select=route_name,direction,points', {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    const data = await res.json();
    const names = [...new Set(data.map(r => r.route_name))];
    const list = document.getElementById('route-list');
    list.innerHTML = names.map(n => `<span class="route-chip" onclick="selectRoute('${n}',this)">${n}</span>`).join('');
    data.forEach(r => {
      if (r.points && r.points.length > 1) {
        const pts = r.points.map(p => [p.lat, p.lng]);
        const color = r.direction === 'going' ? '#1E88E5' : '#E53935';
        const line = L.polyline(pts, {color, weight:4, opacity:0.6}).addTo(map);
        line.routeName = r.route_name;
        line.on('click', () => {
          const chip = [...document.querySelectorAll('.route-chip')].find(c => c.textContent === r.route_name);
          selectRoute(r.route_name, chip);
        });
        routeLines.push(line);
      }
    });
  } catch(e) { console.error(e); }
}

function selectRoute(name, el) {
  selectedRoute = name;
  document.querySelectorAll('.route-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  routeLines.forEach(l => {
    l.setStyle({opacity: l.routeName === name ? 1 : 0.3, weight: l.routeName === name ? 6 : 3});
  });
  document.getElementById('buses-section').style.display = 'block';
  document.getElementById('passenger-badge').style.display = 'block';

  // أرسل موقع الراكب فوراً
  if (userLat) sendPassengerLocation();

  // أرسل كل 15 ثانية
  if (sendInterval) clearInterval(sendInterval);
  sendInterval = setInterval(() => {
    if (userLat) sendPassengerLocation();
  }, 15000);

  fetchBuses();
}

async function sendPassengerLocation() {
  if (!userLat || !selectedRoute) return;
  try {
    await fetch(SUPABASE_URL + '/rest/v1/passengers', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        id: passengerId,
        route_name: selectedRoute,
        lat: userLat,
        lng: userLng
      })
    });
  } catch(e) { console.error('passenger send error:', e); }
}

// احذف الراكب عند إغلاق الصفحة
window.addEventListener('beforeunload', () => {
  if (passengerId) {
    navigator.sendBeacon(
      SUPABASE_URL + '/rest/v1/passengers?id=eq.' + passengerId,
      null
    );
  }
});

function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtDist(m) { return m < 1000 ? Math.round(m)+'م' : (m/1000).toFixed(1)+'كم'; }

async function fetchBuses() {
  if (!userLat) return;
  try {
    let url = SUPABASE_URL + '/rest/v1/live_locations?select=driver_name,route_name,lat,lng';
    if (selectedRoute) url += '&route_name=eq.' + encodeURIComponent(selectedRoute);
    const res = await fetch(url, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    const buses = await res.json();
    busMarkers.forEach(m => map.removeLayer(m));
    busMarkers = [];
    const list = document.getElementById('buses-list');
    if (!buses || buses.length === 0) {
      list.innerHTML = '<div style="color:#aaa;font-size:13px;padding:8px 0">لا توجد حافلات نشطة</div>';
      return;
    }
    const sorted = buses.map(b => ({...b, dist: calcDist(userLat,userLng,b.lat,b.lng)})).sort((a,b)=>a.dist-b.dist);
    list.innerHTML = sorted.map(b => `
      <div class="bus-item">
        <span>🚌</span>
        <span><b>${b.driver_name}</b><br><small>${b.route_name}</small></span>
        <span class="bus-dist">${fmtDist(b.dist)}</span>
      </div>`).join('');
    sorted.forEach(b => {
      const m = L.marker([b.lat, b.lng], {
        icon: L.divIcon({className:'', html:'<div style="font-size:24px">🚌</div>', iconSize:[30,30], iconAnchor:[15,15]})
      }).addTo(map).bindPopup(b.driver_name + '<br>' + b.route_name);
      busMarkers.push(m);
    });
  } catch(e) { console.error(e); }
}
</script>
</body>
</html>
